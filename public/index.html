<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Global Maritime Radar - Auto-Scaling</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            /* This is the dynamic variable that will change as we zoom */
            --ship-size: 14px; 
        }
        body { margin: 0; background: #0b0b0b; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #050505; }
        
        .panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: #00ffcc; padding: 15px;
            border-radius: 8px; border: 1px solid #333; pointer-events: none;
        }
        #details {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: #111; color: white; padding: 20px; width: 240px;
            display: none; border: 1px solid #00ffcc; border-radius: 8px;
        }

        /* The container handles the rotation */
        .ship-container {
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }
        
        /* The SVG handles the dynamic sizing */
        .ship-container svg {
            width: var(--ship-size);
            height: var(--ship-size);
            fill: #00ffcc;
            transition: width 0.2s, height 0.2s; /* Smooth growing/shrinking */
        }
    </style>
</head>
<body>

    <div class="panel">
        <div style="font-size: 10px; opacity: 0.6; letter-spacing: 1px;">RADAR STATUS: ACTIVE</div>
        <div id="counter" style="font-size: 20px; font-weight: bold;">0 Vessels</div>
    </div>

    <div id="details">
        <h3 id="v-name" style="margin:0; color:#00ffcc; border-bottom: 1px solid #333; padding-bottom: 10px;">-</h3>
        <p id="v-info" style="font-size: 13px; line-height: 1.6; color: #ccc;"></p>
        <button onclick="document.getElementById('details').style.display='none'" style="width:100%; padding:8px; cursor:pointer; background:#222; color:white; border:1px solid #444;">CLOSE</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const map = L.map('map', { 
            preferCanvas: true, 
            zoomControl: false,
            minZoom: 3,
            maxBounds: [[-90, -180], [90, 180]]
        }).setView([40, -40], 4); 
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(map);

        // --- DYNAMIC ZOOM SCALING ---
        function updateShipSize() {
            const z = map.getZoom();
            let newSize = 12; // Base size for zoomed out
            if (z >= 6) newSize = 16;
            if (z >= 8) newSize = 22;
            if (z >= 10) newSize = 28;
            if (z >= 12) newSize = 36; // Maximum size when zoomed way in
            document.documentElement.style.setProperty('--ship-size', newSize + 'px');
        }
        // Run it once on load, and listen for map zooms
        updateShipSize();
        map.on('zoomend', updateShipSize);
        // ----------------------------

        const vessels = {};
        const markers = {};
        const socket = io({ transports: ['websocket', 'polling'] });

        // The HTML no longer hardcodes the width/height, the CSS handles it now
        const getIconHtml = (cog) => `
            <div class="ship-container" style="transform: rotate(${cog}deg);">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/>
                </svg>
            </div>
        `;

        // The iconSize is now set to 40x40 to create a massive, easy-to-click invisible box around the ship
        const iconConfig = {
            className: '',
            iconSize: [40, 40], 
            iconAnchor: [20, 20]
        };

        socket.on('ship-batch', (batch) => {
            const bounds = map.getBounds();
            
            batch.forEach(data => {
                const meta = data.MetaData;
                const mmsi = meta.MMSI;
                const pos = [meta.latitude, meta.longitude];
                const cog = data.Message?.PositionReport?.Cog || vessels[mmsi]?.cog || 0;

                vessels[mmsi] = {
                    name: meta.ShipName?.trim() || "Unknown",
                    cog: cog,
                    dest: data.Message?.ShipStaticData?.Destination || vessels[mmsi]?.dest || "N/A",
                    lat: meta.latitude,
                    lon: meta.longitude
                };

                if (bounds.contains(pos)) {
                    if (markers[mmsi]) {
                        markers[mmsi].setLatLng(pos);
                        const el = markers[mmsi].getElement();
                        if (el) {
                            const div = el.querySelector('.ship-container');
                            if (div) div.style.transform = `rotate(${cog}deg)`;
                        }
                    } else {
                        markers[mmsi] = L.marker(pos, {
                            ...iconConfig,
                            html: getIconHtml(cog)
                        }).addTo(map).on('click', () => {
                            const v = vessels[mmsi];
                            document.getElementById('details').style.display = 'block';
                            document.getElementById('v-name').innerText = v.name;
                            document.getElementById('v-info').innerHTML = `<b>MMSI:</b> ${mmsi}<br><b>DEST:</b> ${v.dest}<br><b>HDG:</b> ${v.cog}°`;
                            map.panTo(pos); 
                        });
                        // Leaflet quirk: we have to set HTML after creation when merging config
                        markers[mmsi].setIcon(L.divIcon({...iconConfig, html: getIconHtml(cog)}));
                    }
                }
            });
            document.getElementById('counter').innerText = `${Object.keys(markers).length} Visible`;
        });

        map.on('moveend', () => {
            const bounds = map.getBounds();
            
            Object.keys(markers).forEach(id => {
                if (!bounds.contains(markers[id].getLatLng())) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            });
            
            Object.keys(vessels).forEach(mmsi => {
                const v = vessels[mmsi];
                const pos = [v.lat, v.lon];
                if (bounds.contains(pos) && !markers[mmsi]) {
                    markers[mmsi] = L.marker(pos, {
                        ...iconConfig,
                        html: getIconHtml(v.cog)
                    }).addTo(map).on('click', () => {
                        document.getElementById('details').style.display = 'block';
                        document.getElementById('v-name').innerText = v.name;
                        document.getElementById('v-info').innerHTML = `<b>MMSI:</b> ${mmsi}<br><b>DEST:</b> ${v.dest}<br><b>HDG:</b> ${v.cog}°`;
                        map.panTo(pos);
                    });
                    markers[mmsi].setIcon(L.divIcon({...iconConfig, html: getIconHtml(v.cog)}));
                }
            });
            document.getElementById('counter').innerText = `${Object.keys(markers).length} Visible`;
        });
    </script>
</body>
</html>
