<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Global Maritime Radar - Fast Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0b0b0b; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #050505; }
        .panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: #00ffcc; padding: 15px;
            border-radius: 8px; border: 1px solid #333; pointer-events: none;
        }
        #details {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: #111; color: white; padding: 20px; width: 240px;
            display: none; border: 1px solid #00ffcc; border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <div style="font-size: 10px; opacity: 0.6; letter-spacing: 1px;">RADAR STATUS: ACTIVE</div>
        <div id="counter" style="font-size: 20px; font-weight: bold;">0 Vessels</div>
    </div>

    <div id="details">
        <h3 id="v-name" style="margin:0; color:#00ffcc; border-bottom: 1px solid #333; padding-bottom: 10px;">-</h3>
        <p id="v-info" style="font-size: 13px; line-height: 1.6; color: #ccc;"></p>
        <button onclick="document.getElementById('details').style.display='none'" style="width:100%; padding:8px; cursor:pointer; background:#222; color:white; border:1px solid #444;">CLOSE</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const map = L.map('map', { 
            preferCanvas: true, 
            zoomControl: false,
            minZoom: 3,
            maxBounds: [[-90, -180], [90, 180]]
        }).setView([40, -40], 4); 
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(map);

        const vessels = {};
        const markers = {};
        const socket = io({ transports: ['websocket', 'polling'] });

        const getIconHtml = (cog) => `<div style="transform: rotate(${cog}deg);"><svg viewBox="0 0 24 24" width="14" height="14" style="fill:#00ffcc;"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg></div>`;

        socket.on('ship-batch', (batch) => {
            const bounds = map.getBounds();
            
            batch.forEach(data => {
                const meta = data.MetaData;
                const mmsi = meta.MMSI;
                const pos = [meta.latitude, meta.longitude];
                const cog = data.Message?.PositionReport?.Cog || vessels[mmsi]?.cog || 0;

                vessels[mmsi] = {
                    name: meta.ShipName?.trim() || "Unknown",
                    cog: cog,
                    dest: data.Message?.ShipStaticData?.Destination || vessels[mmsi]?.dest || "N/A",
                    lat: meta.latitude,
                    lon: meta.longitude
                };

                if (bounds.contains(pos)) {
                    if (markers[mmsi]) {
                        markers[mmsi].setLatLng(pos);
                        const el = markers[mmsi].getElement();
                        if (el) {
                            const div = el.querySelector('div');
                            if (div) div.style.transform = `rotate(${cog}deg)`;
                        }
                    } else {
                        markers[mmsi] = L.marker(pos, {
                            icon: L.divIcon({
                                className: '',
                                html: getIconHtml(cog),
                                iconSize: [14, 14], 
                                iconAnchor: [7, 7]
                            })
                        }).addTo(map).on('click', () => {
                            const v = vessels[mmsi];
                            document.getElementById('details').style.display = 'block';
                            document.getElementById('v-name').innerText = v.name;
                            document.getElementById('v-info').innerHTML = `<b>MMSI:</b> ${mmsi}<br><b>DEST:</b> ${v.dest}<br><b>HDG:</b> ${v.cog}°`;
                            // Changed to panTo to prevent zooming
                            map.panTo(pos); 
                        });
                    }
                }
            });
            document.getElementById('counter').innerText = `${Object.keys(markers).length} Visible`;
        });

        map.on('moveend', () => {
            const bounds = map.getBounds();
            
            Object.keys(markers).forEach(id => {
                if (!bounds.contains(markers[id].getLatLng())) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            });
            
            Object.keys(vessels).forEach(mmsi => {
                const v = vessels[mmsi];
                const pos = [v.lat, v.lon];
                if (bounds.contains(pos) && !markers[mmsi]) {
                    markers[mmsi] = L.marker(pos, {
                        icon: L.divIcon({ className: '', html: getIconHtml(v.cog), iconSize: [14, 14], iconAnchor: [7, 7] })
                    }).addTo(map).on('click', () => {
                        document.getElementById('details').style.display = 'block';
                        document.getElementById('v-name').innerText = v.name;
                        document.getElementById('v-info').innerHTML = `<b>MMSI:</b> ${mmsi}<br><b>DEST:</b> ${v.dest}<br><b>HDG:</b> ${v.cog}°`;
                        // Changed to panTo to prevent zooming
                        map.panTo(pos);
                    });
                }
            });
            document.getElementById('counter').innerText = `${Object.keys(markers).length} Visible`;
        });
    </script>
</body>
</html>
